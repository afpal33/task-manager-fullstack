# // docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  backend:
    build: ./task-manager-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://appuser:apppass@postgres:5432/appdb
      PORT: 4000
      JWT_SECRET: my-super-secret-jwt-key-change-in-prod
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
 
  frontend:
    build:
      context: ./task-manager-frontend
      args:
        VITE_API_URL: http://localhost:4000
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend-tests:
    build: ./task-manager-backend
    environment:
      DATABASE_URL: postgresql://appuser:apppass@postgres:5432/appdb
      PORT: 4000
      JWT_SECRET: test-secret
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm ci && npx prisma migrate deploy && npm run test:integration"

  frontend-tests:
    build:
      context: ./task-manager-frontend
      target: test
    environment:
      VITE_API_URL: http://localhost:4000
    command: sh -c "npx vitest run src"
 
volumes:
  postgres_data: