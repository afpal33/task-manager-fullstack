name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirmacion:
        description: 'Escribe DEPLOY para confirmar el despliegue a produccion'
        required: true

jobs:
  frontend-build-test:
    name: Frontend Lint, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./task-manager-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'task-manager-frontend/package-lock.json'
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run --coverage src

  frontend-e2e:
    name: Frontend Pruebas E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./task-manager-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'task-manager-frontend/package-lock.json'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  migraciones:
    name: Migraciones y Seeds
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./task-manager-backend
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'task-manager-backend/package-lock.json'
      - run: npm ci
      - run: npx prisma migrate deploy

  backend-build:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    defaults:
      run:
        working-directory: ./task-manager-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'task-manager-backend/package-lock.json'
      - run: npm install
      - run: npx prisma generate
      - run: npx tsc --noEmit

  deploy-staging:
    name: Deploy a Staging
    needs: [frontend-build-test, frontend-e2e, migraciones, backend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli
      - name: Desplegar a Railway (staging)
        run: railway up --service task-manager-fullstack --environment staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-produccion:
    name: Deploy a Producción (manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirmacion == 'DEPLOY'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - name: Desplegar a Railway (produccion)
        run: railway up --service task-manager-fullstack --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}